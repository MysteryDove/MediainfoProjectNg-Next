# Every run: managed build/test, then self-contained publish artifacts per RID.
name: build-check

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: build-check-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Primary gate: full solution build + unit tests (no native MediaInfo required)
  # ---------------------------------------------------------------------------
  managed:
    name: managed (build + test)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore solution
        run: dotnet restore MediainfoProjectNg.Next.sln

      - name: Build solution (Release)
        run: dotnet build MediainfoProjectNg.Next.sln --no-restore -c Release

      - name: Test
        run: >
          dotnet test tests/MediainfoProjectNg.Next.Tests/MediainfoProjectNg.Next.Tests.csproj
          --no-build -c Release
          --logger "trx;LogFileName=test-results.trx"
          --results-directory TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: managed-test-results
          path: TestResults/**/*.trx
          if-no-files-found: ignore
          retention-days: 14

  # ---------------------------------------------------------------------------
  # Publish-ready self-contained apps per platform (quick testing downloads)
  # Bundles host-arch MediaInfo on Linux/macOS when RID matches the runner.
  # ---------------------------------------------------------------------------
  publish:
    name: publish (${{ matrix.rid }})
    needs: managed
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: win-x64
            os: windows-latest
          - rid: win-arm64
            os: windows-latest
          - rid: linux-x64
            os: ubuntu-latest
          - rid: linux-arm64
            os: ubuntu-24.04-arm
          - rid: osx-arm64
            os: macos-14
          - rid: osx-x64
            os: macos-14
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Submodules needed when we build MediaInfo for this host/RID.
          submodules: recursive
          fetch-depth: 1

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Resolve version label
        id: ver
        shell: bash
        run: |
          sha="$(git rev-parse --short HEAD)"
          echo "label=0.0.0-ci.${sha}" >> "$GITHUB_OUTPUT"
          echo "sha=${sha}" >> "$GITHUB_OUTPUT"

      - name: Install native build tools (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake ninja

      - name: Install native build tools (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build g++ zlib1g-dev

      - name: Publish self-contained (non-single-file)
        shell: bash
        run: |
          set -euo pipefail
          out="artifacts/publish/${{ matrix.rid }}"
          mkdir -p "$out"
          # Slimmer artifacts for download/testing (no PDBs).
          dotnet publish src/MediainfoProjectNg.Next/MediainfoProjectNg.Next.csproj \
            -c Release \
            -r "${{ matrix.rid }}" \
            --self-contained true \
            -p:PublishSingleFile=false \
            -p:DebugType=None \
            -p:DebugSymbols=false \
            -o "$out"
          # Drop common debug leftovers if any slipped through.
          find "$out" -name '*.pdb' -delete 2>/dev/null || true
          echo "Published to $out ($(du -sh "$out" | cut -f1))"

      - name: Build and bundle MediaInfo native (matching host arch)
        if: runner.os == 'Linux' || runner.os == 'macOS'
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          rid="${{ matrix.rid }}"
          host="$(uname -m)"
          out="artifacts/publish/${rid}"

          can_build=0
          case "$rid" in
            *-arm64)
              if [[ "$host" == "arm64" || "$host" == "aarch64" ]]; then can_build=1; fi
              ;;
            *-x64)
              if [[ "$host" == "x86_64" ]]; then can_build=1; fi
              ;;
          esac

          if [[ "$can_build" -ne 1 ]]; then
            echo "Skip native MediaInfo: host arch ($host) does not match RID ($rid)."
            echo "Publish folder is still usable; MediaInfo may show Unavailable until a matching dylib/so is added."
            exit 0
          fi

          chmod +x native/build-host.sh
          ./native/build-host.sh

          # Stage beside the apphost (NativeLibraryLoader probes app base / native/).
          lib=""
          if [[ "$(uname -s)" == "Darwin" ]]; then
            lib="$(find native/out/host -name 'libmediainfo.dylib' | head -n1 || true)"
            if [[ -n "$lib" ]]; then
              cp -f "$lib" "$out/libmediainfo.dylib"
              echo "Bundled $lib -> $out/libmediainfo.dylib"
            fi
          else
            lib="$(find native/out/host -name 'libmediainfo.so*' -type f | head -n1 || true)"
            if [[ -n "$lib" ]]; then
              # Keep soname companion files if present.
              if compgen -G "native/out/host/lib/libmediainfo.so*" > /dev/null; then
                cp -a native/out/host/lib/libmediainfo.so* "$out/"
              else
                cp -f "$lib" "$out/libmediainfo.so"
              fi
              if [[ ! -f "$out/libmediainfo.so" ]]; then
                cp -f "$lib" "$out/libmediainfo.so"
              fi
              echo "Bundled MediaInfo shared libs into $out"
              ls -la "$out"/libmediainfo.so* || true
            fi
          fi

          if [[ -z "${lib:-}" ]]; then
            echo "WARNING: MediaInfo library not found under native/out/host after build." >&2
            exit 1
          fi

      - name: Pack unsigned macOS .app
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          rid="${{ matrix.rid }}"
          chmod +x scripts/pack-macos-app.sh
          ./scripts/pack-macos-app.sh \
            --publish-dir "artifacts/publish/${rid}" \
            --out "artifacts/app/MediainfoProjectNg.Next-${rid}.app" \
            --rid "$rid" \
            --version "${{ steps.ver.outputs.label }}"
          # Zip for easy download (GitHub artifacts flatten .app awkwardly otherwise).
          mkdir -p artifacts/app-zip
          (
            cd artifacts/app
            ditto -c -k --keepParent "MediainfoProjectNg.Next-${rid}.app" \
              "../app-zip/MediainfoProjectNg.Next-${rid}.app.zip"
          )
          ls -lh "artifacts/app-zip/MediainfoProjectNg.Next-${rid}.app.zip"

      - name: Job summary
        if: always()
        shell: bash
        run: |
          {
            echo "## publish (${{ matrix.rid }})"
            echo ""
            echo "- runner: \`${{ matrix.os }}\` / \`${{ runner.os }}\`"
            echo "- version label: \`${{ steps.ver.outputs.label }}\`"
            if [[ -d "artifacts/publish/${{ matrix.rid }}" ]]; then
              echo "- publish size: \`$(du -sh "artifacts/publish/${{ matrix.rid }}" | cut -f1)\`"
              if ls "artifacts/publish/${{ matrix.rid }}"/libmediainfo.* >/dev/null 2>&1; then
                echo "- MediaInfo native: **bundled**"
              else
                echo "- MediaInfo native: **not bundled** (Unavailable at runtime until added)"
              fi
            fi
            if [[ -f "artifacts/app-zip/MediainfoProjectNg.Next-${{ matrix.rid }}.app.zip" ]]; then
              echo "- macOS app zip: \`$(du -sh "artifacts/app-zip/MediainfoProjectNg.Next-${{ matrix.rid }}.app.zip" | cut -f1)\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload publish folder
        uses: actions/upload-artifact@v4
        with:
          name: publish-${{ matrix.rid }}
          path: artifacts/publish/${{ matrix.rid }}/
          if-no-files-found: error
          retention-days: 14
          compression-level: 6

      - name: Upload macOS .app zip
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: app-bundle-${{ matrix.rid }}
          path: artifacts/app-zip/MediainfoProjectNg.Next-${{ matrix.rid }}.app.zip
          if-no-files-found: error
          retention-days: 14
