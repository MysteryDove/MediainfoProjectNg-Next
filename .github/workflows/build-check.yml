# Quick gate on every push: managed compile + unit tests only (no native bundle).
# Full MediaInfo-bundled multi-RID publish runs on pull_request (and via publish-bundled).
name: build-check

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      publish_bundled:
        description: "Also run full MediaInfo-bundled multi-platform publish"
        required: false
        type: boolean
        default: false

concurrency:
  group: build-check-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Always: solution build + unit tests (no MediaInfo native / no multi-RID publish)
  # ---------------------------------------------------------------------------
  managed:
    name: managed (build + test)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore solution
        run: dotnet restore MediainfoProjectNg.Next.sln

      - name: Build solution (Release)
        run: dotnet build MediainfoProjectNg.Next.sln --no-restore -c Release

      - name: Test
        run: >
          dotnet test tests/MediainfoProjectNg.Next.Tests/MediainfoProjectNg.Next.Tests.csproj
          --no-build -c Release
          --logger "trx;LogFileName=test-results.trx"
          --results-directory TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: managed-test-results
          path: TestResults/**/*.trx
          if-no-files-found: ignore
          retention-days: 7

      - name: Summary
        if: always()
        shell: bash
        run: |
          {
            echo "## build-check (quick)"
            echo ""
            echo "- event: \`${{ github.event_name }}\`"
            echo "- managed compile + tests only on **push**"
            echo "- MediaInfo-bundled multi-RID publish: **pull_request**, **draft-release**, or manual **publish-bundled** / build-check with publish_bundled=true"
          } >> "$GITHUB_STEP_SUMMARY"

  # ---------------------------------------------------------------------------
  # PR (and optional manual): full self-contained + MediaInfo for all RIDs
  # ---------------------------------------------------------------------------
  publish-bundled:
    name: publish-bundled
    needs: managed
    if: >
      github.event_name == 'pull_request' ||
      (github.event_name == 'workflow_dispatch' && inputs.publish_bundled == true)
    uses: ./.github/workflows/publish-bundled.yml
    with:
      version_label: "0.0.0-ci"
