# Manual draft release: build MediaInfo-bundled multi-RID packages, then optionally
# create a GitHub draft release with those assets.
name: draft-release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.0.0 or v1.0.0)"
        required: true
        type: string
      dry_run:
        description: "If true, still build packages but do not create a GitHub release"
        required: false
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  version:
    name: Normalize version
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.ver.outputs.tag }}
      name: ${{ steps.ver.outputs.name }}
      version: ${{ steps.ver.outputs.version }}
    steps:
      - name: Normalize version
        id: ver
        shell: bash
        run: |
          raw="${{ inputs.version }}"
          raw="${raw#v}"
          if [[ ! "$raw" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-].*)?$ ]]; then
            echo "Invalid version: ${{ inputs.version }}" >&2
            exit 1
          fi
          echo "tag=v${raw}" >> "$GITHUB_OUTPUT"
          echo "name=v${raw}" >> "$GITHUB_OUTPUT"
          echo "version=${raw}" >> "$GITHUB_OUTPUT"

      - name: Plan
        shell: bash
        run: |
          cat <<EOF
          Draft release plan
          ------------------
          version : ${{ steps.ver.outputs.version }}
          tag     : ${{ steps.ver.outputs.tag }}
          dry_run : ${{ inputs.dry_run }}
          packages: full MediaInfo-bundled multi-RID publish (all platforms/arches)
          EOF

  # Always build bundled packages on draft-release (dry_run only skips GitHub Release create).
  publish-bundled:
    name: publish-bundled
    needs: version
    uses: ./.github/workflows/publish-bundled.yml
    with:
      version_label: ${{ needs.version.outputs.version }}

  release:
    name: Create draft release
    needs: [version, publish-bundled]
    if: ${{ !inputs.dry_run }}
    runs-on: ubuntu-latest
    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: '{publish-zip-*,app-bundle-*}'
          merge-multiple: true

      - name: List release assets
        shell: bash
        run: |
          find dist -type f | sort
          mkdir -p release-assets
          # Flatten zips into release-assets/
          find dist -type f \( -name '*.zip' -o -name '*.app.zip' \) -exec cp -f {} release-assets/ \;
          ls -lah release-assets/

      - name: Create GitHub draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: ${{ needs.version.outputs.name }}
          draft: true
          prerelease: false
          generate_release_notes: true
          body: |
            Draft release **${{ needs.version.outputs.name }}**.

            Packages with **MediaInfo native bundled** (no Native AOT):

            | Asset | Platform | .NET |
            | --- | --- | --- |
            | `MediainfoProjectNg.Next-win-x64.zip` | Windows x64 | Framework-dependent — install [.NET 10 Desktop Runtime](https://dotnet.microsoft.com/download/dotnet/10.0) |
            | `MediainfoProjectNg.Next-win-arm64.zip` | Windows ARM64 | Framework-dependent — install .NET 10 Desktop Runtime |
            | `MediainfoProjectNg.Next-linux-x64.zip` | Linux x64 | Self-contained (runtime included) |
            | `MediainfoProjectNg.Next-linux-arm64.zip` | Linux ARM64 | Self-contained (runtime included) |
            | `MediainfoProjectNg.Next-osx-arm64.zip` | macOS Apple Silicon | Self-contained (runtime included) |
            | `MediainfoProjectNg.Next-osx-x64.zip` | macOS Intel | Self-contained (runtime included) |
            | `MediainfoProjectNg.Next-osx-*.app.zip` | Unsigned macOS `.app` | Self-contained |

            macOS: first open may need **Privacy & Security → Open Anyway**.
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dry-run-note:
    name: Dry-run note
    needs: [version, publish-bundled]
    if: ${{ inputs.dry_run }}
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "Dry run: packages were built (see workflow artifacts publish-* / publish-zip-* / app-bundle-*)."
          echo "No GitHub release created for ${{ needs.version.outputs.tag }}."
          echo "Re-run with dry_run=false to attach assets to a draft release."
