# Manual draft GitHub release. Default is dry-run (no release created).
# When packaging exists, attach multi-RID publish / .app artifacts here.
name: draft-release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.0.0 or v1.0.0)"
        required: true
        type: string
      dry_run:
        description: "If true, only print planned steps (no release created)"
        required: false
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  draft:
    name: Create draft release
    runs-on: ubuntu-latest
    steps:
      - name: Normalize version
        id: ver
        shell: bash
        run: |
          raw="${{ inputs.version }}"
          raw="${raw#v}"
          if [[ ! "$raw" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-].*)?$ ]]; then
            echo "Invalid version: ${{ inputs.version }}" >&2
            exit 1
          fi
          echo "tag=v${raw}" >> "$GITHUB_OUTPUT"
          echo "name=v${raw}" >> "$GITHUB_OUTPUT"
          echo "version=${raw}" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Plan
        shell: bash
        run: |
          cat <<EOF
          Draft release plan
          ------------------
          version : ${{ steps.ver.outputs.version }}
          tag     : ${{ steps.ver.outputs.tag }}
          dry_run : ${{ inputs.dry_run }}
          notes   : scaffold — attach multi-RID publish / unsigned .app when packaging is ready
          EOF

      - name: Collect artifacts (stub)
        if: ${{ !inputs.dry_run }}
        shell: bash
        run: |
          mkdir -p dist
          echo "TODO: download workflow artifacts for ${{ steps.ver.outputs.tag }} into dist/"
          echo "placeholder — packaging not wired yet" > dist/README-RELEASE.txt

      - name: Create GitHub draft release
        if: ${{ !inputs.dry_run }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.name }}
          draft: true
          prerelease: false
          generate_release_notes: true
          body: |
            Draft release **${{ steps.ver.outputs.name }}** (scaffold).

            Attach self-contained, non-single-file binaries (and unsigned macOS `.app` when available).
          files: dist/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Dry-run complete
        if: ${{ inputs.dry_run }}
        run: echo "Dry run only — no release created for ${{ steps.ver.outputs.tag }}"
